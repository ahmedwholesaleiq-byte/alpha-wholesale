<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Wholesale | المنصة الرسمية للتجهيز</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0b0c10;       
            --bg-surface: #14171a;    
            --olive-primary: #556b2f; 
            --olive-light: #8fbc8f;   
            --text-main: #f5f5f5;     
            --text-muted: #8a9199;    
            --border-line: rgba(85, 107, 47, 0.25);
            --danger: #b91c1c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        .container {
            width: 92%;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background-color: var(--bg-surface);
            border-bottom: 2px solid var(--olive-primary);
            padding: 25px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .brand-meta {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--olive-primary), #3b4d22);
            color: var(--text-main);
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            border-radius: 12px;
            border: 1px solid var(--olive-light);
            box-shadow: 0 0 15px rgba(85, 107, 47, 0.4);
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .brand h1 span {
            color: var(--olive-light);
        }

        .brand p {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 2px;
        }

        .admin-toggle-btn {
            background-color: transparent;
            border: 1px solid var(--olive-primary);
            color: var(--olive-light);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }

        .admin-toggle-btn:hover {
            background-color: var(--olive-primary);
            color: var(--text-main);
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 20px;
            background-color: var(--bg-deep);
            border: 1px solid var(--border-line);
            border-radius: 30px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }

        .search-wrapper input:focus {
            border-color: var(--olive-light);
            box-shadow: 0 0 15px rgba(143, 188, 143, 0.2);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 25px auto;
            text-align: center;
        }

        .stat-item {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-line);
            padding: 12px 5px;
            border-radius: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .stat-item span {
            display: block;
            color: var(--olive-light);
            font-weight: 700;
            font-size: 16px;
        }

        .filter-section-title {
            font-size: 14px;
            color: var(--olive-light);
            margin: 15px 0 8px 0;
            font-weight: 700;
            border-right: 3px solid var(--olive-primary);
            padding-right: 8px;
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .filter-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            background-color: var(--bg-surface);
            color: var(--text-muted);
            border: 1px solid var(--border-line);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.25s;
        }

        .tab-btn.active {
            background-color: var(--olive-primary);
            color: var(--text-main);
            border-color: var(--olive-light);
            box-shadow: 0 4px 12px rgba(85, 107, 47, 0.4);
        }

        /* لوحة تحكم المتجر */
        #adminPanel {
            display: none;
            background-color: var(--bg-surface);
            border: 2px dashed var(--olive-primary);
            border-radius: 16px;
            padding: 20px;
            margin-top: 25px;
            margin-bottom: 25px;
        }

        .admin-form {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .admin-form { grid-template-columns: repeat(2, 1fr); }
            .form-full { grid-column: 1 / -1; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 13px;
            color: var(--olive-light);
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            background-color: var(--bg-deep);
            border: 1px solid var(--border-line);
            padding: 10px;
            border-radius: 8px;
            color: var(--text-main);
            outline: none;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--olive-light);
        }

        .colors-checkbox-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background-color: var(--bg-deep);
            padding: 10px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid var(--border-line);
        }

        @media (min-width: 768px) { .colors-checkbox-grid { grid-template-columns: repeat(5, 1fr); } }

        .color-check-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .color-preview-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .save-product-btn {
            background-color: var(--olive-primary);
            color: var(--text-main);
            border: 1px solid var(--olive-light);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: background 0.3s;
        }

        .save-product-btn:hover {
            background-color: #3b4d22;
        }

        /* شبكة عرض المنتجات */
        .products-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 25px;
        }

        .case-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-line);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, border-color 0.3s;
            cursor: pointer;
            position: relative;
        }

        .case-card:hover {
            transform: translateY(-5px);
            border-color: var(--olive-light);
        }

        .delete-item-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--danger);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        body.admin-mode .delete-item-badge {
            display: flex;
        }

        .img-box {
            position: relative;
            width: 100%;
            padding-top: 100%; 
            background-color: #1a1e22;
        }

        .img-box img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .details-box {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
            gap: 8px;
        }

        .details-box h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 38px;
        }

        .tag-cat {
            font-size: 11px;
            background-color: rgba(85, 107, 47, 0.15);
            color: var(--olive-light);
            padding: 3px 8px;
            border-radius: 4px;
            align-self: flex-start;
            font-weight: 600;
        }

        .price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 5px;
        }

        .cost {
            font-weight: 700;
            font-size: 15px;
            color: var(--olive-light);
        }

        .action-btn {
            background-color: var(--olive-primary);
            color: var(--text-main);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* نافذة التفاصيل الفاخرة */
        .cinema-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 15px;
        }

        .modal-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--olive-primary);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(0,0,0,0.5);
            color: var(--text-main);
            border: 1px solid var(--border-line);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-gallery img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-line);
        }

        .modal-details {
            padding: 20px;
        }

        .modal-details h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .price-box {
            background-color: var(--bg-deep);
            border: 1px solid var(--border-line);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
        }

        .price-label {
            color: var(--text-muted);
            font-size: 13px;
        }

        .price-value {
            font-size: 20px;
            font-weight: 900;
            color: var(--olive-light);
        }

        .spec-section {
            margin-bottom: 15px;
        }

        .spec-section h3 {
            font-size: 13px;
            color: var(--olive-light);
            margin-bottom: 6px;
        }

        .desc-text {
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .color-palette {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-ring {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border-line);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .color-inner {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .order-whatsapp-btn {
            display: block;
            background: linear-gradient(135deg, #25d366, #1ebd57);
            color: #fff;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        footer {
            text-align: center;
            padding: 30px 0;
            color: var(--text-muted);
            font-size: 12px;
            border-top: 1px solid var(--border-line);
            margin-top: 40px;
        }

        footer span {
            color: var(--olive-light);
            font-weight: 600;
        }

        @media (min-width: 768px) {
            .header-grid { flex-direction: row; justify-content: space-between; align-items: center; }
            .search-wrapper input { width: 350px; }
            .products-container { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .stats-bar { grid-template-columns: repeat(3, 250px); justify-content: center; gap: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-grid">
            <div class="brand">
                <div class="brand-meta">
                    <div class="logo-icon">A</div>
                    <div>
                        <h1>ALPHA <span>WHOLESALE</span></h1>
                        <p>المنصة الرسمية الموحدة لتجهيز المحلات وموزعي التجزئة</p>
                    </div>
                </div>
                <button class="admin-toggle-btn" id="adminToggleBtn">لوحة التحكم ⚙️</button>
            </div>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="ابحث عن المادة، الموديل، الخامات...">
            </div>
        </div>
    </header>

    <section class="container" id="adminPanel">
        <div class="filter-section-title" style="margin-top: 0; font-size: 16px;">إضافة مادة تجارية جديدة للمخزن</div>
        <div class="admin-form">
            <div class="form-group">
                <label>اسم المادة التجارية:</label>
                <input type="text" id="pTitle" placeholder="مثال: كفر سيليكون بصفائح مغناطيسية">
            </div>
            <div class="form-group">
                <label>سعر التجهيز بالجملة (د.ع):</label>
                <input type="text" id="pPrice" placeholder="مثال: 1,750">
            </div>
            <div class="form-group">
                <label>رابط الصورة أو اسم الملف على GitHub:</label>
                <input type="text" id="pImg" placeholder="مثال: case1.jpg أو ضع رابط ويب مباشر">
            </div>
            <div class="form-group">
                <label>فئة المنتج التجاري:</label>
                <select id="pType">
                    <option value="cases">كفرات وحوافظ</option>
                    <option value="screens">شاشات تجارية</option>
                    <option value="protection">لزقات حماية كاملة</option>
                    <option value="accessories">إكسسوارات وشواحن</option>
                </select>
            </div>
            <div class="form-group">
                <label>الموديل المتوافق:</label>
                <select id="pModel">
                    <option value="all">جميع الموديلات</option>
                    <option value="iphone17promax">iPhone 17 Pro Max</option>
                    <option value="iphone16promax">iPhone 16 Pro Max</option>
                    <option value="iphone15promax">iPhone 15 Pro Max</option>
                    <option value="iphone14promax">iPhone 14 Pro Max</option>
                    <option value="iphone13promax">iPhone 13 Pro Max</option>
                    <option value="iphone12promax">iPhone 12 Pro Max</option>
                    <option value="future">خانات مستقلة للمستقبل</option>
                </select>
            </div>
            <div class="form-group">
                <label>اسم الموديل الظاهر للزبائن:</label>
                <input type="text" id="pModelText" placeholder="مثال: iPhone 15 Pro Max">
            </div>
            <div class="form-group form-full">
                <label>الألوان المتوفرة في الوجبة (اختر كل الألوان المتاحة):</label>
                <div class="colors-checkbox-grid" id="colorsSelectorGrid">
                    </div>
            </div>
            <div class="form-group form-full">
                <label>تفاصيل المادة الفنية والوصف:</label>
                <textarea id="pDesc" rows="3" placeholder="اكتب مواصفات المنتج الدقيقة لأسواق الجملة..."></textarea>
            </div>
            <button class="save-product-btn form-full" id="saveProductBtn">حفظ وإضافة المادة للمتجر فوراً 💾</button>
        </div>
    </section>

    <section class="stats-bar container">
        <div class="stat-item"><span>+10K</span> المنتجات المتاحة</div>
        <div class="stat-item"><span>100%</span> فحص جودة معتمد</div>
        <div class="stat-item"><span>4 شباب</span> إدارة وتجهيز فوري</div>
    </section>

    <div class="container">
        <div class="filter-section-title">فئة المنتجات التجارية</div>
        <nav class="filter-tabs" id="typeFilters">
            <button class="tab-btn active" data-type="all">كل المعروض</button>
            <button class="tab-btn" data-type="cases">كفرات وحوافظ</button>
            <button class="tab-btn" data-type="screens">شاشات تجارية</button>
            <button class="tab-btn" data-type="protection">لزقات حماية كاملة</button>
            <button class="tab-btn" data-type="accessories">إكسسوارات وشواحن</button>
        </nav>

        <div class="filter-section-title">نوع وموديل ال
